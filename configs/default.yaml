  required_cutaways: 1
  opportunistic_cutaways: 2
  cutaway_duration_seconds: 6
  api_provider: fal
  api_model: fal-ai/wan/v2.2-a14b/text-to-video
  api_resolution: 480p
  api_aspect_ratio: "16:9"
  api_num_frames: 81
  api_frames_per_second: 16
  api_num_inference_steps: 20
  api_client_timeout_seconds: 900
  wan_repo_path: vendor/Wan2.2
  wan_task: ti2v-5B
  wan_size: "1280*704"
  wan_ckpt_dir: models/Wan2.2-TI2V-5B
