llm:
  provider: ollama
  model: gemma4
  fallback_model: gemma4:e4b
  ollama_url: http://localhost:11434
  timeout_seconds: 180
  retries: 2

briefing:
  audience: "busy technical leadership"
  target_duration_seconds: 240
  max_sections: 6
  min_sections: 5

slides:
  width: 1920
  height: 1080
  background: "#0B1020"
  foreground: "#F8FAFC"
  accent: "#6EE7B7"
  muted: "#94A3B8"

audio:
  voice: af_heart
  language_code: a
  sample_rate: 24000
  fallback_words_per_minute: 145

video:
