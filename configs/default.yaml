llm:
  provider: ollama
  model: gemma4
  fallback_model: gemma4:e4b
  ollama_url: http://localhost:11434
  timeout_seconds: 180
  retries: 2

briefing:
  audience: "busy technical leadership"
  target_duration_seconds: 240
  max_sections: 6
  min_sections: 5

slides:
  width: 1920
  height: 1080
  background: "#0B1020"
  foreground: "#F8FAFC"
  accent: "#6EE7B7"
  muted: "#94A3B8"

audio:
  repo_id: hexgrad/Kokoro-82M
  voice: af_heart
  language_code: a
  sample_rate: 24000
  fallback_words_per_minute: 145

visuals:
  mode: api
  max_generated_images: 2
  provider_video_duration_seconds: 6
  api_provider: ltx
  api_endpoint: https://api.ltx.video/v1/text-to-video
  api_key_env_vars:
    - LTX_API_KEY
    - LTXV_API_KEY
  api_model: ltx-2-3-fast
  api_resolution: "1920x1080"
  api_client_timeout_seconds: 900
  api_retries: 2
  api_fallback_to_placeholder: true
